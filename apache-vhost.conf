<VirtualHost *:80>
    DocumentRoot /var/www/html/sigma_sms

    <Directory /var/www/html/sigma_sms>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Block direct access to sensitive PHP/SQL files
    <FilesMatch "(config\.php|functions\.php|schema\.sql)$">
        Require all denied
    </FilesMatch>

    # Block the includes directory entirely
    <DirectoryMatch "^/var/www/html/sigma_sms/includes/">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
